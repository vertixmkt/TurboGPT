<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turbo GPT</title>
    <meta name="description" content="Turbo GPT: biblioteca de prompts de marketing, geração de conteúdo e hooks para qualquer LLM." />

    <!-- ── Vendor libs ──────────────────────────────────────────────────── -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- ── Data ─────────────────────────────────────────────────────────── -->
    <script src="./llm-prompts-data.js"></script>
    <script src="./content-hooks-data.js"></script>
    <script src="./skills-data.js"></script>

    <!-- ── Core JS (plain, no JSX) ──────────────────────────────────────── -->
    <script src="./js/config.js"></script>
    <script src="./js/i18n.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/supabase-init.js"></script>
    <script src="./js/context.js"></script>

    <style>
      @font-face {
        font-family: "Helvetica Now";
        src: url("./assets/fonts/HelveticaNowDisplay-Regular.woff") format("woff");
        font-style: normal;
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: "Helvetica Now";
        src: url("./assets/fonts/HelveticaNowDisplay-Medium.woff") format("woff");
        font-style: normal;
        font-weight: 500;
        font-display: swap;
      }
      @font-face {
        font-family: "Helvetica Now";
        src: url("./assets/fonts/HelveticaNowDisplay-Bold.woff") format("woff");
        font-style: normal;
        font-weight: 800;
        font-display: swap;
      }
      :root {
        color-scheme: dark;
        --bg:            #000000;
        --grid:          rgba(255, 255, 255, 0.032);
        --surface:       rgba(22, 22, 22, 0.80);
        --surface-b:     rgba(6, 6, 6, 0.64);
        --surface-flat:  #0f0f0f;
        --raised:        #161616;
        --blue:          #3b82f6;
        --blue-dark:     #1d4ed8;
        --accent:        #3b82f6;
        --accent-dim:    rgba(59, 130, 246, 0.10);
        --accent-text:   #ffffff;
        --text:          #ffffff;
        --muted:         #888888;
        --border:        rgba(255, 255, 255, 0.09);
        --border-s:      rgba(255, 255, 255, 0.16);
        --r-sm: 10px; --r-md: 14px; --r-lg: 18px; --r-xl: 24px;
        --glass:
          inset 0 1px 0 rgba(255, 255, 255, 0.14),
          inset 0 -1px 0 rgba(255, 255, 255, 0.03),
          0 20px 52px rgba(0, 0, 0, 0.48),
          0 0 0 1px rgba(255, 255, 255, 0.022);
        --glass-hover:
          inset 0 1px 0 rgba(255, 255, 255, 0.22),
          inset 0 -1px 0 rgba(255, 255, 255, 0.055),
          0 24px 64px rgba(0, 0, 0, 0.58),
          0 0 0 1px rgba(255, 255, 255, 0.07),
          0 0 48px rgba(59, 130, 246, 0.14);
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
      }
      * { box-sizing: border-box; }
      html,
      body,
      #root {
        max-width: 100%;
        overflow-x: hidden;
      }
      body {
        margin: 0;
        background:
          radial-gradient(circle at 50% -8%, rgba(59, 130, 246, 0.22), transparent 32%),
          radial-gradient(circle at 6% 14%,  rgba(14, 165, 233, 0.12), transparent 26%),
          radial-gradient(circle at 88% 72%, rgba(29, 78,  216, 0.08), transparent 28%),
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px),
          var(--bg);
        background-size: auto, auto, auto, 48px 48px, 48px 48px, auto;
        color: var(--text);
        font-family: "Helvetica Now", sans-serif;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      body::before {
        content: "";
        position: fixed; inset: 0; z-index: -1; pointer-events: none;
        background:
          linear-gradient(180deg, rgba(0,0,0,0.04), rgba(0,0,0,0.86) 60%),
          radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05), transparent 44%);
      }
      .font-display { font-family: "Helvetica Now", sans-serif; }
      .font-mono-ui { font-family: "Helvetica Now", sans-serif; }
      ::selection {
        background: rgba(59, 130, 246, 0.70);
        color: #ffffff;
      }
      input::placeholder { color: rgba(255,255,255,0.30); }
      @keyframes entry { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
      @keyframes ping { 75%,100% { transform:scale(2); opacity:0; } }
      @keyframes modalIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
      @keyframes pageLoad { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
      .animate-entry { animation: entry 0.5s ease both; }
      .animate-ping   { animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite; }
      .modal-in       { animation: modalIn 0.2s ease both; }
      .surface-card {
        position: relative;
        overflow: hidden;
        isolation: isolate;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, var(--surface) 0%, var(--surface-b) 100%);
        box-shadow: var(--glass);
        backdrop-filter: blur(18px) saturate(145%);
        -webkit-backdrop-filter: blur(18px) saturate(145%);
        transition: box-shadow 0.25s var(--ease), transform 0.25s var(--ease), border-color 0.25s;
      }
      .surface-card::before {
        content: "";
        position: absolute; inset: 0; z-index: 0;
        opacity: 0.55; pointer-events: none;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.04) 34%, rgba(255,255,255,0) 70%),
          radial-gradient(circle at 18% 0%, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0) 38%),
          linear-gradient(180deg, rgba(59,130,246,0.10) 0%, rgba(0,0,0,0) 70%);
        transition: opacity 0.25s var(--ease);
      }
      .surface-card::after {
        content: "";
        position: absolute; inset: 1px; z-index: 0;
        border-radius: inherit; opacity: 0.30; mix-blend-mode: screen; pointer-events: none;
        background:
          linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 26%),
          linear-gradient(315deg, rgba(59,130,246,0.13) 0%, rgba(255,255,255,0) 22%);
        transition: opacity 0.25s var(--ease);
      }
      .surface-card:hover {
        box-shadow: var(--glass-hover);
        transform: translateY(-2px);
        border-color: rgba(59,130,246,0.22);
      }
      .surface-card:hover::before { opacity: 1; }
      .surface-card:hover::after { opacity: 0.65; }
      .surface-card > * { position: relative; z-index: 1; }
      .surface-card > .surface-rail { z-index: 2; }
      #root           { animation: pageLoad 0.55s cubic-bezier(0.16,1,0.3,1); }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- ── Components bundle (plain JS for local file opening) ─────────── -->
    <script src="./components.bundle.js"></script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turbo GPT</title>
    <meta name="description" content="Turbo GPT: biblioteca de prompts de marketing, geração de conteúdo e hooks para qualquer LLM." />

    <!-- ── Vendor libs ──────────────────────────────────────────────────── -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- ── Data ─────────────────────────────────────────────────────────── -->
    <script src="./llm-prompts-data.js"></script>
    <script src="./content-hooks-data.js"></script>
    <script src="./skills-data.js"></script>

    <!-- ── Core JS (plain, no JSX) ──────────────────────────────────────── -->
    <script src="./js/config.js"></script>
    <script src="./js/i18n.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/supabase-init.js"></script>
    <script src="./js/context.js"></script>

    <style>
      @font-face {
        font-family: "Helvetica Now";
        src: url("./assets/fonts/HelveticaNowDisplay-Regular.woff") format("woff");
        font-style: normal;
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: "Helvetica Now";
        src: url("./assets/fonts/HelveticaNowDisplay-Medium.woff") format("woff");
        font-style: normal;
        font-weight: 500;
        font-display: swap;
      }
      @font-face {
        font-family: "Helvetica Now";
        src: url("./assets/fonts/HelveticaNowDisplay-Bold.woff") format("woff");
        font-style: normal;
        font-weight: 800;
        font-display: swap;
      }
      :root {
        --bg: #000000;
        --surface: #0f0f0f;
        --surface-raised: #161616;
        --border: rgba(255, 255, 255, 0.08);
        --border-hover: rgba(255, 255, 255, 0.15);
        --accent: #3b82f6;
        --accent-dim: rgba(59, 130, 246, 0.10);
        --accent-text: #ffffff;
        --text: #ffffff;
        --text-muted: #888888;
        --shadow-soft: 0 20px 60px rgba(0, 0, 0, 0.6);
      }
      * { box-sizing: border-box; }
      html,
      body,
      #root {
        max-width: 100%;
        overflow-x: hidden;
      }
      body {
        margin: 0;
        background: #000000;
        color: var(--text);
        font-family: "Helvetica Now", sans-serif;
        overflow-x: hidden;
      }
      .font-display { font-family: "Helvetica Now", sans-serif; }
      .font-mono-ui { font-family: "Helvetica Now", sans-serif; }
      ::selection {
        background: rgba(59, 130, 246, 0.70);
        color: #ffffff;
      }
      input::placeholder { color: rgba(255,255,255,0.30); }
      @keyframes entry { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
      @keyframes ping { 75%,100% { transform:scale(2); opacity:0; } }
      @keyframes modalIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
      @keyframes pageLoad { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
      .animate-entry { animation: entry 0.5s ease both; }
      .animate-ping   { animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite; }
      .modal-in       { animation: modalIn 0.2s ease both; }
      .surface-card {
        position: relative;
        overflow: hidden;
        isolation: isolate;
        background-color: rgba(255,255,255,0.055);
        backdrop-filter: blur(18px) saturate(145%);
        -webkit-backdrop-filter: blur(18px) saturate(145%);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.16),
          inset 0 -1px 0 rgba(255,255,255,0.035),
          0 18px 48px rgba(0,0,0,0.42),
          0 0 0 1px rgba(255,255,255,0.025) !important;
      }
      .surface-card::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        opacity: 0.58;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.13) 0%, rgba(255,255,255,0.045) 34%, rgba(255,255,255,0.00) 72%),
          radial-gradient(circle at 18% 0%, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.00) 38%),
          linear-gradient(180deg, rgba(59,130,246,0.12) 0%, rgba(0,0,0,0.00) 74%);
        transition: opacity 180ms ease, transform 180ms ease;
        pointer-events: none;
      }
      .surface-card::after {
        content: "";
        position: absolute;
        inset: 1px;
        z-index: 0;
        border-radius: inherit;
        background:
          linear-gradient(135deg, rgba(255,255,255,0.20) 0%, rgba(255,255,255,0.00) 28%),
          linear-gradient(315deg, rgba(59,130,246,0.15) 0%, rgba(255,255,255,0.00) 24%);
        opacity: 0.34;
        mix-blend-mode: screen;
        transition: opacity 180ms ease;
        pointer-events: none;
      }
      .surface-card:hover {
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.22),
          inset 0 -1px 0 rgba(255,255,255,0.06),
          0 22px 58px rgba(0,0,0,0.52),
          0 0 0 1px rgba(255,255,255,0.08),
          0 0 32px rgba(59,130,246,0.12) !important;
      }
      .surface-card:hover::before {
        opacity: 1;
        transform: translateY(-1px);
      }
      .surface-card:hover::after { opacity: 0.68; }
      .surface-card > :not(.surface-rail) { position: relative; z-index: 1; }
      #root           { animation: pageLoad 0.55s cubic-bezier(0.16,1,0.3,1); }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- ── Components bundle (plain JS for local file opening) ─────────── -->
    <script src="./components.bundle.js"></script>
  </body>
</html>
